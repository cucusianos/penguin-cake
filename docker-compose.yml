services:
  mysql:
    image: mysql:8.0
    container_name: penguin-cake-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: penguin_cake
      MYSQL_USER: penguin
      MYSQL_PASSWORD: penguin123
    ports: ["3306:3306"]
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
  redis:
    image: redis:7-alpine
    container_name: penguin-cake-redis
    ports: ["6379:6379"]
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: penguin-cake-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: penguin
      RABBITMQ_DEFAULT_PASS: penguin123
    ports: ["5672:5672", "15672:15672"]
  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: penguin-cake-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: penguin
      MINIO_ROOT_PASSWORD: penguin123456
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
volumes:
  mysql-data:
  minio-data:
